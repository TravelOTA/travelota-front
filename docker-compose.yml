services:
  traefik:
    image: traefik:latest
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"  # Optional: adds dashboard at http://localhost:8080
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard (optional)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  nuxt-app:
    build: .
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nuxt.rule=Host(`localhost`)"  # Use domain in production
      - "traefik.http.routers.nuxt.entrypoints=web"
      - "traefik.http.services.nuxt.loadbalancer.server.port=3000"
    ports:
      - "3000:3000"  # Optional: direct access to Nuxt (bypass Traefik)
    volumes:
      - .:/app  # Mount current directory for hot reloading
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
    restart: unless-stopped